<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>present tense</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-left">
      <h1>present tense</h1>
      <div id="week-label" class="week-label"></div>
    </div>
    <div class="header-right">
      <a href="#sanity-section" class="header-heart" aria-label="Sanity"><i class="iconoir-heart"></i></a>
      <nav class="loc-toggle">
        <button class="loc-btn active" data-loc="sf">SF</button>
        <button class="loc-btn" data-loc="ann-arbor">Ann Arbor</button>
      </nav>
    </div>
  </header>

  <main>

    <section id="weather-section" class="card">
      <div class="section-header">
        <h2>Weather</h2>
        <span id="weather-updated" class="updated-label"></span>
      </div>
      <div id="weather-body"></div>
    </section>

    <nav id="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="professional"><i class="iconoir-suitcase"></i> Professional</button>
      <button class="filter-btn" data-filter="health"><i class="iconoir-running"></i> Health</button>
      <button class="filter-btn" data-filter="dance"><i class="iconoir-music-double-note"></i> Dance</button>
      <button class="filter-btn" data-filter="music"><i class="iconoir-music-note"></i> Music</button>
      <button class="filter-btn" data-filter="comedy"><i class="iconoir-emoji-satisfied"></i> Comedy</button>
      <button class="filter-btn" data-filter="art"><i class="iconoir-palette"></i> Art</button>
    </nav>

    <section id="events-section" class="card content-section" data-categories="dance,music,comedy,art">
      <div class="section-header">
        <h2><i class="iconoir-calendar"></i> <span id="events-heading">Events this week</span></h2>
        <span id="events-updated" class="updated-label"></span>
      </div>
      <div id="events-body" class="section-body"></div>
    </section>

    <section id="museums-section" class="card content-section" data-categories="art" data-loc="sf">
      <div class="section-header">
        <h2><i class="iconoir-frame"></i> Museums</h2>
        <span id="museums-updated" class="updated-label"></span>
      </div>
      <div id="museums-body" class="section-body"></div>
    </section>

    <section id="aa-venues-section" class="card content-section" data-categories="art" data-loc="ann-arbor" style="display:none">
      <div class="section-header">
        <h2><i class="iconoir-frame"></i> Venues & Museums</h2>
        <span id="aa-venues-updated" class="updated-label"></span>
      </div>
      <div id="aa-venues-body" class="section-body"></div>
    </section>

    <section id="professional-section" class="card content-section" data-categories="professional">
      <div class="section-header">
        <h2><i class="iconoir-suitcase"></i> Professional</h2>
        <span id="professional-updated" class="updated-label"></span>
      </div>
      <div id="professional-body" class="section-body"></div>
    </section>

    <section id="gym-section" class="card content-section" data-categories="health" data-loc="sf">
      <div class="section-header">
        <h2><i class="iconoir-gym"></i> Bay Club</h2>
        <span id="gym-updated" class="updated-label"></span>
      </div>
      <div id="gym-body" class="section-body"></div>
    </section>

    <section id="sanity-section" class="card">
      <div class="section-header">
        <h2>Sanity</h2>
        <div class="sanity-tabs">
          <button class="sanity-tab active" data-period="week">This week</button>
          <button class="sanity-tab" data-period="month">This month</button>
          <button class="sanity-tab" data-period="all">All time</button>
        </div>
      </div>
      <div id="sanity-list"></div>
    </section>

    <section id="mix-section" class="card">
      <div class="section-header">
        <h2>This week</h2>
        <span id="mix-hours" class="updated-label"></span>
      </div>
      <div id="mix-body"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
