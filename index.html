<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>present tense</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-left">
      <h1><a href="https://amymapsmith.github.io/present-tense" style="color:inherit;text-decoration:none">present tense</a></h1>
      <div id="week-label" class="week-label"></div>
    </div>
    <div class="header-right">
      <button class="yolo-btn" id="yolo-btn">✈ yolo</button>
      <nav class="loc-toggle">
        <button class="loc-btn active" data-loc="sf">SF</button>
        <button class="loc-btn" data-loc="ann-arbor">Ann Arbor</button>
      </nav>
    </div>
  </header>

  <nav class="section-nav">
    <a class="snav-link active" href="#weather-section" data-section="weather">Weather</a>
    <a class="snav-link" href="#work-section" data-section="work">Work</a>
    <a class="snav-link" href="#wealth-section" data-section="wealth">Wealth</a>
    <a class="snav-link" href="#whimsy-section" data-section="whimsy">Whimsy</a>
  </nav>

  <main>

    <section id="weather-section" class="card">
      <div class="section-header">
        <h2>Weather</h2>
        <span id="weather-updated" class="updated-label"></span>
      </div>
      <div id="weather-body"></div>
    </section>

    <section id="work-section" class="card">
      <div class="section-header">
        <h2><i class="iconoir-suitcase"></i> Work</h2>
        <span id="work-updated" class="updated-label"></span>
      </div>
      <nav class="section-filter" data-section="work">
        <button class="sfilt-btn active" data-filter="all">All</button>
        <button class="sfilt-btn" data-filter="listings">Job listings</button>
        <button class="sfilt-btn" data-filter="networking">Networking</button>
      </nav>
      <div id="work-body"></div>
    </section>

    <section id="wealth-section" class="card">
      <div class="section-header">
        <h2><i class="iconoir-gym"></i> Wealth</h2>
        <span id="wealth-updated" class="updated-label"></span>
      </div>
      <nav class="section-filter" data-section="wealth">
        <button class="sfilt-btn active" data-filter="all">All</button>
        <button class="sfilt-btn sf-only" data-filter="gym">Gym</button>
        <button class="sfilt-btn" data-filter="dance">Dance</button>
      </nav>
      <div id="wealth-body"></div>
    </section>

    <section id="whimsy-section" class="card">
      <div class="section-header">
        <h2><i class="iconoir-palette"></i> Whimsy</h2>
        <span id="whimsy-updated" class="updated-label"></span>
      </div>
      <nav class="section-filter" data-section="whimsy">
        <button class="sfilt-btn active" data-filter="all">All</button>
        <button class="sfilt-btn" data-filter="music">Music</button>
        <button class="sfilt-btn" data-filter="comedy">Comedy</button>
        <button class="sfilt-btn" data-filter="art">Art</button>
        <button class="sfilt-btn" data-filter="museums">Museums</button>
      </nav>
      <div id="whimsy-body"></div>
    </section>

  </main>

  <div id="yolo-view">
    <div class="yolo-view-header">
      <button class="yolo-back-btn" id="yolo-back-btn">← back</button>
    </div>
    <div id="yolo-content" class="yolo-view-body"></div>
  </div>

  <script src="js/yolo.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
